# Application
spring.application.name=gitranking
server.port=8080

# Logging
logging.level.com.gitranking=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info

# GitHub API
github.api.url=https://api.github.com
github.token=

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Scoring
scoring.stars-weight=3.0
scoring.forks-weight=2.0
scoring.recency-decay=0.001

# Disable default Spring Boot whitelabel error page — errors handled by GlobalExceptionHandler
spring.mvc.problemdetails.enabled=false

# Resilience4j Retry
resilience4j.retry.instances.githubSearch.max-attempts=3
resilience4j.retry.instances.githubSearch.wait-duration=500ms
resilience4j.retry.instances.githubSearch.retry-exceptions=com.gitranking.exception.GitHubUpstreamException,java.io.IOException
resilience4j.retry.instances.githubSearch.ignore-exceptions=com.gitranking.exception.GitHubAuthException,com.gitranking.exception.GitHubRateLimitException
